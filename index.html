<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aerium Creations | Decoración de Eventos de Alto Impacto</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        /* Contenedor del portafolio de Gamma */
        .iframe-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .web-container {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Bloqueador mejorado para tapar el logo de Gamma por completo */
        .gamma-blocker {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 240px; /* Lo aumentamos de 180px a 200px */
            height: 65px;  
            background-color: #121212; 
            z-index: 999; 
            pointer-events: auto; 
        }

        /* Barra de contacto responsive */
        .contact-footer {
            background-color: #1a1a1a;
            border-top: 1px solid #333;
            padding: 10px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            z-index: 9999; 
            position: relative;
            gap: 10px;
        }

        .contact-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: #ffffff;
            font-size: 13px; /* Un pelín más pequeña para que quepan ambos en celular */
            font-weight: bold;
            padding: 10px 12px;
            border-radius: 25px;
            transition: background 0.3s ease;
            flex: 1; 
            max-width: 200px; 
            white-space: nowrap; /* Evita que el texto se rompa en dos líneas */
        }

        /* Botón de WhatsApp */
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
        }

        /* Botón de Correo */
        .btn-email {
            background-color: #ea4335;
            color: white;
        }
        .btn-email:hover {
            background-color: #c5221f;
        }

        .icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="iframe-wrapper">
        <iframe class="web-container" src="https://mundo-magico-globos-iwe6g15.gamma.site/"></iframe>
        <div class="gamma-blocker"></div>
    </div>

    <footer class="contact-footer">
        <a href="https://wa.me/51913499450?text=Hola%20Aerium%20Creations,%20me%20gustaría%20cotizar%20un%20evento" target="_blank" class="contact-button btn-whatsapp">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
            WhatsApp
        </a>

        <a href="mailto: aeriumcreations@gmail.com?subject=Cotización%20de%20Decoración" class="contact-button btn-email">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/5968/5968534.png" alt="Email">
            Correo
        </a>
    </footer>

</body>
</html>
