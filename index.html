<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aerium Creations | Decoración de Eventos de Alto Impacto</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        /* Contenedor especial para esconder el logo de Gamma abajo */
        .iframe-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Hacemos el mapa de Gamma un poquito más alto para empujar el logo fuera de la pantalla */
        .web-container {
            width: 100%;
            height: calc(100% + 55px); /* Empuja el logo 55px hacia abajo */
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Barra de contacto profesional que tapará cualquier intento de verse el logo */
        .contact-footer {
            background-color: #1a1a1a;
            border-top: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-sizing: border-box;
            z-index: 9999; /* Asegura que los botones queden siempre por encima */
            position: relative;
        }

        .contact-button {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            transition: background 0.3s ease;
        }

        /* Botón de WhatsApp */
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
        }

        /* Botón de Correo */
        .btn-email {
            background-color: #ea4335;
            color: white;
        }
        .btn-email:hover {
            background-color: #c5221f;
        }

        .icon {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="iframe-wrapper">
        <iframe class="web-container" src="https://mundo-magico-globos-iwe6g15.gamma.site/"></iframe>
    </div>

    <footer class="contact-footer">
        <a href="https://wa.me/51913499450?text=Hola%20Aerium%20Creations,%20me%20gustaría%20cotizar%20un%20evento" target="_blank" class="contact-button btn-whatsapp">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
            Escríbenos por WhatsApp
        </a>

        <a href="mailto:aeriumcreations@gmail.com?subject=Cotización%20de%20Decoración" class="contact-button btn-email">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email">
            Envíanos un Correo
        </a>
    </footer>

</body>
</html>
